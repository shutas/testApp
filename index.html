<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shuta Suzuki | Stack Game</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game-container">
    <div id="sidebar-left">
      <div class="panel">
        <h3>Hold</h3>
        <canvas id="hold-canvas" width="100" height="80"></canvas>
      </div>
    </div>
    <div id="board-wrapper">
      <canvas id="board"></canvas>
      <div id="overlay" class="hidden">
        <div id="overlay-content">
          <h2 id="overlay-title">Game Over</h2>
          <p id="overlay-score"></p>
          <button id="restart-btn">Play Again</button>
        </div>
      </div>
    </div>
    <div id="sidebar-right">
      <div class="panel">
        <h3>Next</h3>
        <canvas id="next-canvas" width="100" height="80"></canvas>
      </div>
      <div class="panel">
        <h3>Score</h3>
        <p id="score">0</p>
      </div>
      <div class="panel">
        <h3>High Score</h3>
        <p id="high-score">0</p>
      </div>
      <div class="panel">
        <h3>Level</h3>
        <p id="level">1</p>
      </div>
      <div class="panel">
        <h3>Lines</h3>
        <p id="lines">0</p>
      </div>
    </div>
  </div>
  <div id="controls-hint">
    <p>&#8592; &#8594; Move &nbsp; &#8593; Rotate &nbsp; &#8595; Soft Drop &nbsp; Space Hard Drop &nbsp; C Hold</p>
  </div>
  <script src="game.js"></script>
</body>
</html>
